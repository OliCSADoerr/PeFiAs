<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyFinancialApp</title>
  <link rel="stylesheet" href="/css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar">
    <h1>&#128176; MyFinancialApp</h1>
    <div class="nav-actions">
      <button class="btn btn-primary" onclick="openImportModal()">&#128229; Import .xlsx</button>
      <button class="btn btn-success" onclick="saveAllData()">&#128190; Save</button>
    </div>
  </nav>

  <!-- Tabs -->
  <div class="tabs" id="tabs">
    <div class="tab active" data-tab="dashboard" onclick="switchTab('dashboard')">&#128202; Dashboard</div>
    <!-- Month tabs will be injected here -->
  </div>

  <!-- Dashboard Section -->
  <div class="section active" id="section-dashboard">
    <div class="container">
      <div class="summary-row" id="dashboard-summary"></div>
      <div class="grid-2" id="dashboard-charts">
        <div class="card">
          <div class="card-header"><h3>Monthly Overview</h3></div>
          <div class="chart-container"><canvas id="chart-monthly"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Expense Breakdown (All Months)</h3></div>
          <div class="chart-container"><canvas id="chart-expenses-pie"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Income Breakdown (All Months)</h3></div>
          <div class="chart-container"><canvas id="chart-income-pie"></canvas></div>
        </div>
        <div class="card">
          <div class="card-header"><h3>Net Balance Trend</h3></div>
          <div class="chart-container"><canvas id="chart-balance"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Month sections will be injected here -->
  <div id="month-sections"></div>

  <!-- Import Modal -->
  <div class="modal-overlay" id="import-modal">
    <div class="modal">
      <h2>&#128229; Import Spreadsheet</h2>
      <p style="color:var(--text-secondary);margin-bottom:1rem;font-size:0.9rem;">
        Upload an .xlsx file with the same format (Expenses in columns A-C, Incomings in E-G, one sheet per month).
      </p>
      <div class="form-group">
        <label for="import-file">Select .xlsx file</label>
        <input type="file" id="import-file" accept=".xlsx">
      </div>
      <div class="form-group">
        <label for="import-year">Year for imported data</label>
        <input type="number" id="import-year" value="2026" min="2000" max="2100">
      </div>
      <div class="modal-actions">
        <button class="btn" onclick="closeImportModal()">Cancel</button>
        <button class="btn btn-primary" onclick="importFile()">Import</button>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="/js/app.js"></script>
</body>
</html>
